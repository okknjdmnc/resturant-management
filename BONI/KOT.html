<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-maroon { background-color: #800000; }
        .text-maroon { color: #800000; }
        .border-maroon { border-color: #800000; }
        .hover-maroon:hover { background-color: #600000; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex flex-col">

    <header class="bg-maroon p-4 text-white shadow-md flex justify-between items-center">
        <div class="flex gap-8 items-center">
            <h1 class="text-2xl font-black tracking-tighter">RESTAURANT<span class="text-red-200">OS</span></h1>
            <div class="h-6 w-px bg-maroon-light opacity-30"></div>
            <div class="flex items-center gap-2 text-sm font-medium">
                <span class="opacity-70">TABLE:</span>
                <span class="bg-white text-maroon px-3 py-0.5 rounded shadow-sm font-bold">T-14</span>
            </div>
        </div>
        <div class="flex items-center gap-4 text-sm">
            <span class="font-semibold uppercase tracking-widest text-xs">Lunch Session</span>
            <div class="bg-red-900 px-3 py-1 rounded">Capt. Miller</div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <section class="w-3/4 p-8 overflow-y-auto space-y-10">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <h2 class="text-xs font-bold uppercase tracking-widest text-maroon mb-6 flex items-center gap-2">
                    <span class="w-2 h-2 bg-maroon rounded-full"></span> 1. Occupancy (Pax)
                </h2>
                <div class="grid grid-cols-3 gap-8">
                    <div class="flex flex-col items-center">
                        <span class="text-xs font-bold text-gray-400 mb-3 uppercase">Adults</span>
                        <div class="flex items-center gap-6">
                            <button class="w-12 h-12 border-2 border-gray-200 rounded-lg text-2xl hover:bg-gray-50 active:bg-gray-100 transition shadow-sm">-</button>
                            <span class="text-4xl font-black text-maroon">04</span>
                            <button class="w-12 h-12 bg-maroon text-white rounded-lg text-2xl hover-maroon transition shadow-md">+</button>
                        </div>
                    </div>
                    <div class="flex flex-col items-center border-x border-gray-100">
                        <span class="text-xs font-bold text-gray-400 mb-3 uppercase">Children</span>
                        <div class="flex items-center gap-6">
                            <button class="w-12 h-12 border-2 border-gray-200 rounded-lg text-2xl hover:bg-gray-50 transition shadow-sm">-</button>
                            <span class="text-4xl font-black text-maroon">02</span>
                            <button class="w-12 h-12 bg-maroon text-white rounded-lg text-2xl hover-maroon transition shadow-md">+</button>
                        </div>
                    </div>
                    <div class="flex flex-col items-center">
                        <span class="text-xs font-bold text-gray-400 mb-3 uppercase">Infant</span>
                        <div class="flex items-center gap-6">
                            <button class="w-12 h-12 border-2 border-gray-200 rounded-lg text-2xl hover:bg-gray-50 transition shadow-sm">-</button>
                            <span class="text-4xl font-black text-gray-300">01</span>
                            <button class="w-12 h-12 bg-gray-200 text-gray-600 rounded-lg text-2xl hover:bg-gray-300 transition shadow-sm">+</button>
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <h2 class="text-xs font-bold uppercase tracking-widest text-maroon mb-6 flex items-center gap-2">
                    <span class="w-2 h-2 bg-maroon rounded-full"></span> 2. Select Tier
                </h2>
                <div class="grid grid-cols-3 gap-6">
                    <button class="group bg-white p-6 rounded-xl border-2 border-gray-100 hover:border-gray-300 focus:border-maroon focus:ring-1 focus:ring-maroon transition-all text-left shadow-sm">
                        <div class="w-8 h-8 rounded bg-gray-100 mb-4 flex items-center justify-center text-gray-400 group-focus:bg-maroon group-focus:text-white">✓</div>
                        <h3 class="text-lg font-bold">Normal</h3>
                        <p class="text-gray-500 text-xs mt-1">Standard buffet menu + basic beverages.</p>
                        <p class="text-maroon font-bold mt-4">$25.00/head</p>
                    </button>

                    <button class="group bg-white p-6 rounded-xl border-2 border-gray-100 hover:border-gray-300 focus:border-maroon focus:ring-1 focus:ring-maroon transition-all text-left shadow-sm">
                        <div class="w-8 h-8 rounded bg-gray-100 mb-4 flex items-center justify-center text-gray-400 group-focus:bg-maroon group-focus:text-white">✓</div>
                        <h3 class="text-lg font-bold">HighEnd</h3>
                        <p class="text-gray-500 text-xs mt-1">Includes premium seafood and grill stations.</p>
                        <p class="text-maroon font-bold mt-4">$45.00/head</p>
                    </button>

                    <button class="group bg-white p-6 rounded-xl border-2 border-red-100 hover:border-red-200 focus:border-red-600 focus:ring-1 focus:ring-red-600 transition-all text-left shadow-sm">
                        <div class="w-8 h-8 rounded bg-red-50 mb-4 flex items-center justify-center text-red-300 group-focus:bg-red-600 group-focus:text-white">!</div>
                        <h3 class="text-lg font-bold text-red-800">HardMode</h3>
                        <p class="text-gray-500 text-xs mt-1">Spicy extreme menu + unlimited premium bar.</p>
                        <p class="text-red-600 font-bold mt-4">$65.00/head</p>
                    </button>
                </div>
            </div>

            <div class="bg-gray-100 p-6 rounded-xl border border-dashed border-gray-300">
                <h2 class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-4">Table Add-ons</h2>
                <div class="grid grid-cols-4 gap-4">
                    <button class="bg-white py-3 px-4 rounded-lg shadow-sm text-sm font-medium hover:bg-gray-50 transition border border-gray-200">Extra Water</button>
                    <button class="bg-white py-3 px-4 rounded-lg shadow-sm text-sm font-medium hover:bg-gray-50 transition border border-gray-200">Fresh Bread</button>
                    <button class="bg-white py-3 px-4 rounded-lg shadow-sm text-sm font-medium hover:bg-gray-50 transition border border-gray-200">Hot Towels</button>
                    <button class="bg-white py-3 px-4 rounded-lg shadow-sm text-sm font-medium hover:bg-gray-50 transition border border-gray-200">Special Cake</button>
                </div>
            </div>
        </section>

        <section class="w-1/4 bg-white border-l border-gray-200 flex flex-col shadow-2xl z-10">
            <div class="p-6 border-b border-gray-100">
                <h2 class="font-black text-maroon text-xl italic uppercase tracking-tighter">Current Ticket</h2>
            </div>
            
            <div class="flex-1 p-6 space-y-4">
                <div class="flex justify-between items-center text-sm border-b border-gray-50 pb-2">
                    <span class="font-medium text-gray-600 underline decoration-maroon">4 Adults (HighEnd)</span>
                    <span class="font-bold text-maroon">$180.00</span>
                </div>
                <div class="flex justify-between items-center text-sm border-b border-gray-50 pb-2">
                    <span class="font-medium text-gray-600 underline decoration-maroon">2 Children (HighEnd)</span>
                    <span class="font-bold text-maroon">$45.00</span>
                </div>
                <div class="flex justify-between items-center text-xs text-blue-600 bg-blue-50 p-2 rounded">
                    <span>Fresh Bread x 1</span>
                    <span class="uppercase font-bold">Free</span>
                </div>
            </div>

            <div class="p-6 bg-gray-50 border-t border-gray-200">
                <div class="flex justify-between items-end mb-6">
                    <span class="text-gray-400 font-bold uppercase text-xs">Total Billable</span>
                    <span class="text-3xl font-black text-maroon">$225.00</span>
                </div>
                <div class="space-y-3">
                    <button class="w-full py-5 bg-maroon text-white font-black rounded-xl shadow-lg hover-maroon transition transform active:scale-[0.98] uppercase tracking-widest">
                        Confirm
                    </button>
                    <button class="w-full py-3 bg-white text-gray-400 border border-gray-200 font-bold rounded-xl hover:bg-gray-100 transition text-xs uppercase">
                        Clear Table
                    </button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
