<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gojo Manager - {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: white; }</style>
</head>
<body class="flex min-h-screen">
    <aside class="w-64 border-r border-white/5 bg-[#0a0a0a] flex flex-col fixed h-full">
        <div class="p-8">
            <h1 class="text-xl font-black italic text-white text-center">
                GOJO <span class="text-cyan-500">OPS</span>
            </h1>
            <p class="text-[8px] text-gray-500 text-center uppercase tracking-[0.3em] mt-1 font-bold">Managerial Terminal</p>
        </div>

        <nav class="flex-1 px-4 space-y-2">
            <a href="{{ url_for('manager.dashboard') }}" class="flex items-center px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all {{ 'bg-cyan-600 text-white' if request.path == url_for('manager.dashboard') else 'text-gray-500 hover:bg-white/5' }}">
                <span>Operations Room</span>
            </a>
            <a href="#" class="text-gray-500 hover:bg-white/5 flex items-center px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest">
                <span>Inventory Control</span>
            </a>
            <a href="#" class="text-gray-500 hover:bg-white/5 flex items-center px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest">
                <span>Staff Schedule</span>
            </a>

            <a href="{{ url_for('manager.manage_reservations') }}" class="text-gray-500 hover:bg-white/5 flex items-center px-4 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest">
                <span>Manage Reservations</span>
            </a>
        </nav>

        <div class="p-4 border-t border-white/5">
            <div class="bg-cyan-500/5 p-4 rounded-2xl border border-cyan-500/10 text-center">
                <p class="text-[9px] text-cyan-500 font-black uppercase mb-1">Manager Session</p>
                <p class="text-[10px] truncate text-gray-400 mb-3">{{ session.get('user_email') }}</p>
                <a href="{{ url_for('auth.logout') }}" class="block py-2 rounded-lg bg-cyan-600 text-white text-[9px] font-black uppercase hover:bg-cyan-500 transition-all">Exit Terminal</a>
            </div>
        </div>
    </aside>

    <main class="flex-1 ml-64 p-10">
        {% block manager_content %}{% endblock %}
    </main>
</body>
</html>
