<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Premium Restaurant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center">
        <div class="w-full max-w-md">
            <!-- Header -->
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold text-red-950">🍽️ Premium Restaurant</h1>
                <p class="text-gray-600 mt-2">Staff & Admin Login</p>
            </div>

            <!-- Login Card -->
            <div class="bg-white rounded-lg shadow-lg p-8">
                {% if error %}
                <div class="mb-4 p-4 bg-red-100 text-red-700 rounded-lg border border-red-300">
                    {{ error }}
                </div>
                {% endif %}

                <form method="post" class="space-y-6">
                    {% csrf_token %}
                    
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Username</label>
                        <input type="text" name="username" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-950" placeholder="Enter your username">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Password</label>
                        <input type="password" name="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-950" placeholder="Enter your password">
                    </div>

                    <button type="submit" class="w-full py-2 rounded-lg font-bold text-white bg-red-950 hover:bg-red-900 transition">
                        Login
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-600">
                        Don't have an account? Contact your administrator.
                    </p>
                </div>
            </div>

            <!-- Footer -->
            <div class="text-center mt-8">
                <a href="{% url 'home' %}" class="text-gray-600 hover:text-gray-800 transition">&larr; Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
