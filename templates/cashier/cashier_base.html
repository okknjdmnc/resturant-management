<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOJO HOUSE | CASHIER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body class="text-white antialiased">
    <nav class="border-b border-white/5 bg-zinc-900/50 backdrop-blur-xl sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-8 h-8 bg-yellow-500 rounded-lg flex items-center justify-center shadow-lg shadow-yellow-500/20">
                    <span class="text-black font-black text-xs">$</span>
                </div>
                <h1 class="font-black italic tracking-tighter text-lg">CASHIER <span class="text-yellow-500">TERMINAL</span></h1>
            </div>
            <div class="flex items-center gap-6 text-[10px] font-bold uppercase tracking-widest text-gray-500">
                <span class="text-emerald-500 flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> SYSTEM ONLINE
                </span>
                <a href="{{ url_for('auth.logout') }}" class="hover:text-red-500 transition-colors italic">Log Out</a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        {% block cashier_content %}{% endblock %}
    </main>
</body>
</html>
