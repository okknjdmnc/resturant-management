<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gojo House | Front-Desk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#09090b] text-gray-100 overflow-hidden">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-[#09090b] border-r border-white/5 flex flex-col">
            <div class="p-6">
                <div class="flex items-center space-x-3 mb-10">
                    <div class="h-8 w-8 bg-yellow-500 rounded-lg flex items-center justify-center text-black font-black">G</div>
                    <span class="font-black tracking-tighter text-xl italic uppercase">Gojo House</span>
                </div>

                <nav class="space-y-1">
                    <p class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-4 px-3">Main Menu</p>
                    
                    <a href="{{ url_for('front_desk.dashboard') }}" 
                       class="flex items-center space-x-3 px-3 py-3 rounded-xl transition-all {{ 'bg-yellow-500/10 text-yellow-500' if request.endpoint == 'front_desk.dashboard' else 'text-gray-400 hover:bg-white/5 hover:text-white' }}">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                        </svg>
                        <span class="text-sm font-bold uppercase tracking-tight">Table Map</span>
                    </a>

                    <a href="{{ url_for('front_desk.guest_directory') }}" 
                        class="flex items-center space-x-3 px-3 py-3 rounded-xl transition-all {{ 'bg-yellow-500/10 text-yellow-500' if request.endpoint == 'front_desk.guest_list' else 'text-gray-400 hover:bg-white/5 hover:text-white' }}">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                            </svg>
                            <span class="text-sm font-bold uppercase tracking-tight">Master Guest List</span>
                    </a>
                </nav>
            </div>

            <div class="mt-auto p-4 border-t border-white/5">
                <div class="bg-white/[0.03] p-4 rounded-2xl flex items-center justify-between">
                    <div class="flex items-center space-x-3">
                        <div class="h-8 w-8 rounded-full bg-gradient-to-tr from-yellow-500 to-orange-500 flex items-center justify-center text-xs font-black text-black uppercase">
                            {{ session.get('role')[0] if session.get('role') else 'F' }}
                        </div>
                        <div>
                            <p class="text-[10px] text-gray-500 font-bold uppercase leading-none mb-1">On Duty</p>
                            <p class="text-xs font-black text-white truncate w-24">Front-Desk</p>
                        </div>
                    </div>
                    <a href="{{ url_for('auth.logout') }}" class="text-gray-500 hover:text-red-500 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                    </a>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#0c0c0e]">
            <header class="h-16 border-b border-white/5 flex items-center justify-between px-8 bg-[#09090b]/50 backdrop-blur-xl">
                <div id="live-clock" class="text-xs font-bold text-gray-500 tabular-nums">Loading time...</div>
                <div class="flex items-center space-x-4 bg-emerald-500/5 px-3 py-1.5 rounded-full border border-emerald-500/10">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    <span class="text-[10px] font-black text-emerald-500 uppercase tracking-[0.2em]">Live Sync Active</span>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto custom-scrollbar p-8">
                {% block front_desk_content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/security.js') }}"></script>
    <script src="{{ url_for('static', filename='js/liveCheck.js') }}"></script>
    <script src="{{ url_for('static', filename='js/refresh.js') }}"></script>
    {% block js %}{% endblock %}
  
</body>
</html>
